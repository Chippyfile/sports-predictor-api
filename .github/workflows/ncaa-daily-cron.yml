name: NCAA Daily Cron

on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  ncaa-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run NCAA cron
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 10 ] && [ "$HOUR" -le 18 ]; then
            MODE=predict
          else
            MODE=grade
          fi
          echo "=== Grading ==="
          curl -s --max-time 300 "https://sports-predictor-api-production.up.railway.app/cron/ncaa-daily?mode=grade" | python3 -m json.tool 2>/dev/null || true
          if [ "$MODE" = "predict" ]; then
            echo "=== Backfilling missing games ==="
            curl -s --max-time 300 "https://sports-predictor-api-production.up.railway.app/cron/ncaa-backfill" | python3 -m json.tool 2>/dev/null || true
            echo "=== Predicting ==="
            curl -s --max-time 300 "https://sports-predictor-api-production.up.railway.app/cron/ncaa-daily?mode=predict" | python3 -m json.tool 2>/dev/null || true
          fi
