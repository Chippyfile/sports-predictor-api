[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 600"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Daily auto-training at 4 AM ET (8:00 UTC) ─────────────────
# Trains in-season sports, compares MAE vs current model,
# promotes only if better. Logs to Supabase training_log table.
# Requires Railway Hobby plan ($5/mo). Free-tier alternative:
# use GitHub Actions workflow (see daily-train.yml).
[[cron]]
schedule = "0 8 * * *"
endpoint = "/cron/auto-train"

# ── MLB predictions: every hour 10AM-8PM ET (15:00-01:00 UTC) ──
[[cron]]
schedule = "0 15,16,17,18,19,20,21,22,23,0,1 * * *"
endpoint = "/cron/mlb-daily?mode=auto"

# ── NBA predictions: 10AM ET ──
[[cron]]
schedule = "0 15 * * *"
endpoint = "/cron/nba-daily?mode=predict"

# ── Grading: 1AM ET (06:00 UTC) ──
[[cron]]
schedule = "0 6 * * *"
endpoint = "/cron/mlb-daily?mode=grade"

[[cron]]
schedule = "0 6 * * *"
endpoint = "/cron/nba-daily?mode=grade"
